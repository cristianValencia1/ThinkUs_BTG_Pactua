version: "3.9"
services:
  app:
    build: .
    container_name: btg-app-mongo
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/btg_funds
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: btg-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
